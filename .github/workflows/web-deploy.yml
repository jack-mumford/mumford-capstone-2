name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libglfw3-dev libgl-dev \
            libx11-dev libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev

      - name: Cache Raylib native build
        id: cache-raylib-native
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/libraylib.a
          key: raylib-5.5-native-ubuntu

      - name: Build and install Raylib 5.5 (native)
        if: steps.cache-raylib-native.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch 5.5 https://github.com/raysan5/raylib.git /tmp/raylib-src
          cmake -S /tmp/raylib-src -B /tmp/raylib-build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF
          cmake --build /tmp/raylib-build --parallel $(nproc)
          sudo cmake --install /tmp/raylib-build

      - name: Build game objects
        run: make all

      - name: Run unit tests
        run: make test-unit

  build-and-deploy:
    needs: [test]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64

      - name: Cache Raylib web build
        id: cache-raylib-web
        uses: actions/cache@v4
        with:
          # Only cache the compiled library — never overwrite committed repo files
          path: raylib-web/libraylib.a
          key: raylib-5.5-web-emsdk-3.1.64

      - name: Build Raylib for WebAssembly
        if: steps.cache-raylib-web.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch 5.5 https://github.com/raysan5/raylib.git raylib-src
          cd raylib-src/src
          make PLATFORM=PLATFORM_WEB -B
          mkdir -p ../../raylib-web
          cp libraylib.a raylib.h raymath.h ../../raylib-web/

      - name: Build web
        run: make web

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        