name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Raylib (for compiling and linking test binary)
        run: sudo apt-get update && sudo apt-get install -y libraylib-dev

      - name: Build game objects
        run: make all

      - name: Run unit tests
        run: make test-unit

  build-and-deploy:
    needs: [test]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64

      - name: Cache Raylib web build
        id: cache-raylib-web
        uses: actions/cache@v4
        with:
          # Only cache the compiled library — never overwrite committed repo files
          path: raylib-web/libraylib.a
          key: raylib-5.5-web-emsdk-3.1.64

      - name: Build Raylib for WebAssembly
        if: steps.cache-raylib-web.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch 5.5 https://github.com/raysan5/raylib.git raylib-src
          cd raylib-src/src
          make PLATFORM=PLATFORM_WEB -B
          mkdir -p ../../raylib-web
          cp libraylib.a raylib.h raymath.h ../../raylib-web/

      - name: Build web
        run: make web

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        